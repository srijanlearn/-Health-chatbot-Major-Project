# HealthyPartner v2 — Fine-Tuning Configuration
# Research basis: HEaltcare_Chatbot_LLM.md (ADR-001, fine-tuning section)
#
# Hardware targets:
#   Minimum : Google Colab free T4 (16 GB VRAM)
#   Local   : RTX 3060 / 3070 (8-12 GB VRAM) — use gradient_checkpointing: true
#   Ideal   : RTX 4090 / A100 (24+ GB VRAM)

# ── Base model ──────────────────────────────────────────────────────────────────
model:
  name: "unsloth/Qwen3-4B-Instruct-bnb-4bit"   # 4-bit quantised for training (saves ~50% VRAM)
  max_seq_length: 2048                           # Qwen3 supports up to 32K; 2K covers 95% of queries
  dtype: null                                    # auto-detect (bfloat16 on Ampere+, float16 otherwise)
  load_in_4bit: true

# ── LoRA (QLoRA) ─────────────────────────────────────────────────────────────────
lora:
  r: 16                        # Rank — higher = more capacity, more VRAM
  alpha: 32                    # Scale = alpha / r; 2x rank is standard
  dropout: 0.05
  bias: "none"
  use_gradient_checkpointing: "unsloth"   # Unsloth's optimised checkpointing (30% less VRAM)
  random_state: 42
  use_rslora: false
  # Target all linear projection layers for best quality
  # (research: "target all projection layers" outperforms q/v only for domain adaptation)
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

# ── Training ─────────────────────────────────────────────────────────────────────
training:
  output_dir: "./training/checkpoints"
  num_train_epochs: 2                    # 1-3 epochs; 2 is sweet spot for 5K-10K examples
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4        # Effective batch = 2 * 4 = 8
  warmup_steps: 50
  learning_rate: 2.0e-4                  # Research: "lr 2e-4" for QLoRA on small models
  weight_decay: 0.01
  lr_scheduler_type: "cosine"
  seed: 42
  fp16: false
  bf16: true                             # bfloat16 on Ampere+ (T4 uses fp16 — auto-detected)
  logging_steps: 10
  save_steps: 100
  save_total_limit: 2
  eval_strategy: "steps"
  eval_steps: 100
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  report_to: "none"                      # set to "wandb" if you want experiment tracking
  dataloader_num_workers: 0              # 0 = no multiprocessing (safer on Colab)

# ── Dataset ───────────────────────────────────────────────────────────────────────
dataset:
  train_file: "./training/data/train.jsonl"
  eval_file:  "./training/data/eval.jsonl"
  # prepare_dataset.py reads these raw sources and builds train/eval splits
  raw_sources:
    - "./training/data/sample_qa.jsonl"
    - "./app/knowledge/data/irdai_regulations.json"
    - "./app/knowledge/data/ayushman_bharat.json"
    - "./app/knowledge/data/generic_medicines.json"
    - "./app/knowledge/data/drug_interactions.json"
    - "./app/knowledge/data/icd10_symptoms.json"
  eval_split: 0.1                        # 10% held out for validation
  max_examples: 10000                    # Cap — quality > quantity

# ── System prompt ────────────────────────────────────────────────────────────────
# This gets prepended to every training example.
# The model learns to always respond as this persona.
system_prompt: |
  You are HealthyPartner, a trusted AI healthcare assistant for India.
  You specialize in health insurance policies, IRDAI regulations, Ayushman Bharat (PMJAY),
  generic medicine alternatives, lab report interpretation, and general health guidance.
  Always give accurate, concise answers. For serious medical concerns, recommend consulting a doctor.
  For insurance queries, cite specific clauses or waiting periods when known.
  Respond in the same language as the user (Hindi or English).

# ── Export ────────────────────────────────────────────────────────────────────────
export:
  merged_model_dir: "./training/merged_model"
  gguf_dir: "./training/gguf"
  gguf_quantization: "q4_k_m"           # Q4_K_M: best accuracy/size tradeoff (>98% accuracy)
  ollama_model_name: "healthypartner"   # registered as: ollama run healthypartner
  ollama_modelfile: "./training/Modelfile"
